name: Tests

permissions:
    contents: write
on:
    push:
        branches: [ master ]
    pull_request:
        branches: [ master ]

jobs:
    changes:
        runs-on: ubuntu-latest
        name: Assess changes
        steps:
            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Decide checks 💖
                uses: tj-actions/changed-files@v47
                id: changes
                with:
                    files_ignore: |
                        README.md
                        LICENSE
                        NOTICE
                        .mailmap
                        .gitignore
                        .github/FUNDING.yml
        outputs:
            code_changed: ${{ steps.changes.outputs.any_changed }}

    Linux:
        runs-on: ubuntu-24.04
        needs: changes
        if: ${{ needs.changes.outputs.code_changed == 'true' }}
        steps:
            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            # this needs to happen outside of the docker container, as the container lacks git
            -   name: 💖 Check format 💖
                run: |
                    swift package dollup --allow-writing-to-package-directory
                    git diff --exit-code

            -   name: 💖 Set up mock deployments 💖
                run: |
                    docker compose -f .github/mongonet/docker-compose.yml up -d

            -   name: 💖 Initialize replica set 💖
                run: |
                    timeout 60s bash -c \
                    'until docker exec -t mongonet-mongo-0-1 /bin/mongosh --file /create-replica-set.js; do sleep 1; done'

            -   name: 💖 Run pipeline 💖
                run: |
                    docker run -t --rm --network=mongonet \
                        --name mongonet-environment \
                        --user root \
                        -v $PWD:/swift-mongodb \
                        -w /swift-mongodb \
                        swift:6.2.4-noble \
                        /bin/bash Scripts/TestAll

            -   name: 💖 Update badge 💖
                uses: rarestype/rarestbadge@v1
                if: always()

    macOS:
        runs-on: macos-26
        needs: changes
        if: ${{ needs.changes.outputs.code_changed == 'true' }}
        steps:
            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Select Xcode 26.3 💖
                run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

            -   name: 💖 Check format 💖
                run: |
                    swift package dollup --allow-writing-to-package-directory
                    git diff --exit-code

            -   name: 💖 Build debug 💖
                run: |
                    swift --version
                    swift build

            -   name: 💖 Update badge 💖
                uses: rarestype/rarestbadge@v1
                if: always()
